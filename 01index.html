<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Lançamentos Shaktar</title>
    <!-- Bibliotecas Externas via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { background-color: #0f1115; color: #f1f5f9; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* Contornos de Proximidade Dinâmicos */
        .contour-safe { border: 1px solid rgba(255,255,255,0.05); }
        .contour-yellow { border: 1px solid rgba(234, 179, 8, 0.4); box-shadow: 0 0 15px rgba(234, 179, 8, 0.05); }
        .contour-orange { border: 1px solid rgba(249, 115, 22, 0.4); box-shadow: 0 0 15px rgba(249, 115, 22, 0.08); }
        .contour-green { border: 1px solid rgba(16, 185, 129, 0.4); box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }

        /* Estilos de Status na Pipeline */
        .status-critical { border-left: 6px solid #ef4444; }
        .status-urgent { border-left: 6px solid #f97316; }
        .status-warning { border-left: 6px solid #eab308; }
        .status-event { border-left: 6px solid #a855f7; }
        .status-done { border-left: 6px solid #475569; opacity: 0.7; }
        .status-planning { border-left: 6px solid #06b6d4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const IMPEDIMENT_TYPES = ["Aguardando Cliente", "Aguardando Material", "Aguardando Aprovação", "Dependência Setor", "Problema Técnico", "Outro"];
        
        const LABEL_COLORS = [
            { id: 'cyan', bg: 'bg-cyan-500/10', text: 'text-cyan-400', border: 'border-cyan-500/30', hex: '#06b6d4' },
            { id: 'emerald', bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/30', hex: '#10b981' },
            { id: 'amber', bg: 'bg-amber-500/10', text: 'text-amber-400', border: 'border-amber-500/30', hex: '#f59e0b' },
            { id: 'rose', bg: 'bg-rose-500/10', text: 'text-rose-400', border: 'border-rose-500/30', hex: '#f43f5e' },
            { id: 'indigo', bg: 'bg-indigo-500/10', text: 'text-indigo-400', border: 'border-indigo-500/30', hex: '#6366f1' },
            { id: 'purple', bg: 'bg-purple-500/10', text: 'text-purple-400', border: 'border-purple-500/30', hex: '#a855f7' },
            { id: 'slate', bg: 'bg-slate-500/10', text: 'text-slate-400', border: 'border-slate-500/30', hex: '#64748b' }
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyCaUqmEygbQSLgCorAuMz8zsZK-jpOk3Yc",
            authDomain: "dashboardlancamentos.firebaseapp.com",
            projectId: "dashboardlancamentos",
            storageBucket: "dashboardlancamentos.firebasestorage.app",
            messagingSenderId: "47726825354",
            appId: "1:47726825354:web:fec75cac7546759e5c8273"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        db.settings({ experimentalForceLongPolling: true });

        // --- MOTOR LÓGICO DE DADOS ---
        
        const parseLocalDate = (dateStr) => {
            if (!dateStr) return null;
            const [y, m, d] = dateStr.split('-').map(Number);
            return new Date(y, m - 1, d, 0, 0, 0);
        };

        const getLaunchStatus = (launch, tasks) => {
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const capDate = parseLocalDate(launch.dateStart);
            const eventStart = parseLocalDate(launch.dateEvent);
            const eventEnd = parseLocalDate(launch.dateEnd);
            
            const activeTasks = tasks.filter(t => !t.isDeleted);
            const pendingTasks = activeTasks.filter(t => !t.completed);
            const hasImpediments = activeTasks.some(t => t.impedimentReason && !t.completed);

            // Regra de Encerramento
            if (eventEnd && today > eventEnd) {
                return { label: 'Encerrado', color: 'bg-slate-600', level: 'done', priority: 0, class: 'status-done' };
            }

            // Regra de Evento Ativo
            if (eventStart && today >= eventStart) {
                return { label: 'Em Evento', color: 'bg-purple-600', level: 'event', priority: 1, class: 'status-event' };
            }

            // --- PADRONIZAÇÃO DO RISCO (NOVA REGRA: 12 DIAS + PENDÊNCIAS) ---
            const diffCap = capDate ? Math.ceil((capDate - today) / (1000 * 60 * 60 * 24)) : null;

            // Se tem tasks pendentes E (faltam <= 12 dias OU tem impedimento)
            if (pendingTasks.length > 0 && ( (diffCap !== null && diffCap <= 12) || hasImpediments )) {
                return { label: 'Crítico / Atrasado', color: 'bg-red-600 pulse-red', level: 'critical', priority: 10, class: 'status-critical' };
            }

            // Se captação já iniciou e não tem pendências
            if (capDate && today >= capDate) {
                return { label: 'Em Captação', color: 'bg-green-600', level: 'success', priority: 2, class: 'status-planning' };
            }

            if (!capDate) return { label: 'Sem Data', color: 'bg-slate-800', level: 'neutral', priority: 0, class: '' };

            // Outros status de proximidade
            if (diffCap <= 3) return { label: 'Urgente', color: 'bg-red-500', level: 'urgent', priority: 8, days: diffCap, class: 'status-urgent' };
            if (diffCap <= 7) return { label: 'Alerta', color: 'bg-orange-500', level: 'alert', priority: 6, days: diffCap, class: 'status-warning' };
            if (diffCap <= 14) return { label: 'Atenção', color: 'bg-yellow-600', level: 'warning', priority: 4, days: diffCap, class: 'status-warning' };
            
            return { label: 'Planejamento', color: 'bg-cyan-700', level: 'planning', priority: 1, days: diffCap, class: 'status-planning' };
        };

        const getCardContour = (launch) => {
            const today = new Date();
            today.setHours(0,0,0,0);
            const capDate = parseLocalDate(launch.dateStart);
            if (!capDate) return 'contour-safe';

            const diffDays = Math.ceil((capDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays <= 0) return 'contour-green'; 
            if (diffDays <= 10) return 'contour-orange'; 
            if (diffDays <= 15) return 'contour-yellow'; 
            return 'contour-safe';
        };

        const Icons = {
            Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Check: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" className="w-3.5 h-3.5"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            X: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-6 h-6"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Calendar: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            User: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Alert: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            Clock: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            TrendingUp: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>,
            Archive: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>,
            Edit: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            ChevronDown: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            Chart: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>,
            Users: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            RotateCcw: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>,
            Flag: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" className="w-3 h-3"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>,
            ShieldAlert: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            Tag: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        };

        function ModernSelect({ value, options, onChange, placeholder = "Selecione...", direction = "down" }) {
            const [isOpen, setIsOpen] = useState(false);
            const containerRef = useRef(null);
            useEffect(() => {
                const clickOutside = (e) => { if (containerRef.current && !containerRef.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', clickOutside);
                return () => document.removeEventListener('mousedown', clickOutside);
            }, []);
            
            return (
                <div className="relative w-full" ref={containerRef}>
                    <div onClick={() => setIsOpen(!isOpen)} className="flex items-center justify-between bg-black/40 border border-white/10 p-3 rounded-xl cursor-pointer hover:border-cyan-500/30 transition-all text-[11px] font-bold uppercase text-slate-300">
                        <span className={!value ? "text-slate-600" : "text-cyan-400"}>{value || placeholder}</span>
                        <div className={`transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}><Icons.ChevronDown /></div>
                    </div>
                    {isOpen && (
                        <div className={`absolute left-0 right-0 ${direction === 'up' ? 'bottom-full mb-2' : 'mt-2'} bg-[#1c2128] border border-white/10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] animate-in z-[100] py-1 overflow-y-auto max-h-48 custom-scrollbar`}>
                            <div onClick={() => { onChange(""); setIsOpen(false); }} className="px-4 py-2 hover:bg-white/5 text-[10px] font-black uppercase text-slate-500 cursor-pointer border-b border-white/5">Nenhum</div>
                            {options.map(opt => (
                                <div key={opt.id || opt.name} onClick={() => { onChange(opt.name); setIsOpen(false); }} className="px-4 py-2 hover:bg-cyan-500/10 hover:text-cyan-400 text-[10px] font-black uppercase cursor-pointer text-slate-300 transition-colors">{opt.name}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('board'); 
            const [user, setUser] = useState(null);
            const [launches, setLaunches] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [assignees, setAssignees] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isBinOpen, setIsBinOpen] = useState(false);
            const [isAssigneesOpen, setIsAssigneesOpen] = useState(false);
            const [isArchivesOpen, setIsArchivesOpen] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) setUser(u);
                    else auth.signInAnonymously().catch(console.error);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const baseRef = db.collection('shaktar_data').doc('main');
                const unsubL = baseRef.collection('launches').onSnapshot(s => { setLaunches(s.docs.map(d => ({id: d.id, ...d.data()}))); setLoading(false); });
                const unsubT = baseRef.collection('tasks').onSnapshot(s => setTasks(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubA = baseRef.collection('assignees').onSnapshot(s => setAssignees(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubL(); unsubT(); unsubA(); };
            }, [user]);

            if (loading) return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-[#0f1115]">
                    <div className="spinner mb-6"></div>
                    <p className="text-cyan-400 font-black text-[10px] tracking-[0.4em] uppercase animate-pulse">Squad Shaktar Inicializando...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-[#0f1115]">
                    <header className="bg-[#161920]/90 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center sticky top-0 z-40 shadow-xl">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-cyan-600 p-2 rounded-xl text-white">🚀</div>
                                <h1 className="font-bold text-white text-lg tracking-tight">Shaktar <span className="text-cyan-400">Hub</span></h1>
                            </div>
                            <nav className="hidden md:flex bg-black/40 p-1 rounded-xl border border-white/5">
                                <button onClick={() => setView('board')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'board' ? 'bg-cyan-600 text-white' : 'text-slate-500 hover:text-slate-300'}`}>Board</button>
                                <button onClick={() => setView('pipeline')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'pipeline' ? 'bg-cyan-600 text-white' : 'text-slate-500 hover:text-slate-300'}`}>Pipeline</button>
                            </nav>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsArchivesOpen(true)} className="flex items-center gap-2 px-3 py-1.5 rounded-xl border border-white/10 text-[10px] font-black uppercase text-slate-500 hover:text-white transition-all"><Icons.Archive /><span className="hidden lg:inline">Arquivados</span></button>
                            <button onClick={() => setIsAssigneesOpen(true)} className="flex items-center gap-2 px-3 py-1.5 rounded-xl border border-white/10 text-[10px] font-black uppercase text-slate-500 hover:text-white transition-all"><Icons.Users /><span className="hidden lg:inline">Squad</span></button>
                            <button onClick={() => setIsBinOpen(true)} className="flex items-center gap-2 px-3 py-1.5 rounded-xl border border-white/10 text-[10px] font-black uppercase text-slate-500 hover:text-white transition-all"><Icons.Trash /><span className="hidden lg:inline">Lixeira</span></button>
                            <button onClick={() => setIsAdding(true)} className="bg-cyan-600 px-5 py-2 rounded-xl font-bold text-xs uppercase shadow-lg shadow-cyan-900/20 hover:bg-cyan-500 text-white transition-all active:scale-95">Novo Lançamento</button>
                        </div>
                    </header>

                    {view === 'board' ? (
                        <main className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 flex-1 max-w-7xl mx-auto w-full animate-in">
                            {launches.filter(l => !l.isDeleted && !l.isArchived).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).map(l => (
                                <LaunchCard key={l.id} launch={l} tasks={tasks.filter(t => t.launchId === l.id)} assignees={assignees} db={db} />
                            ))}
                        </main>
                    ) : (
                        <PipelineView launches={launches.filter(l => !l.isDeleted && !l.isArchived)} tasks={tasks.filter(t => !t.isDeleted)} assignees={assignees} />
                    )}

                    {isAdding && <AddLaunchModal onClose={() => setIsAdding(false)} db={db} />}
                    {isAssigneesOpen && <AssigneesModal assignees={assignees} onClose={() => setIsAssigneesOpen(false)} db={db} />}
                    {isBinOpen && <BinModal launches={launches.filter(l => l.isDeleted)} tasks={tasks.filter(t => t.isDeleted)} onClose={() => setIsBinOpen(false)} db={db} />}
                    {isArchivesOpen && <ArchivesModal launches={launches.filter(l => !l.isDeleted && l.isArchived)} tasks={tasks} onClose={() => setIsArchivesOpen(false)} db={db} />}
                </div>
            );
        }

        function LaunchCard({ launch, tasks, assignees, db }) {
            const [txt, setTxt] = useState('');
            const [selAssignee, setSelAssignee] = useState('');
            const [isEditModal, setIsEditModal] = useState(false);
            const [isDelModal, setIsDelModal] = useState(false);
            const [isTagModal, setIsTagModal] = useState(false);
            const [activeTaskDetail, setActiveTaskDetail] = useState(null);

            const baseRef = db.collection('shaktar_data').doc('main');
            const activeTasks = tasks.filter(t => !t.isDeleted);
            
            const allLaunchTasks = useMemo(() => {
                return [...activeTasks].sort((a, b) => {
                    if (a.completed === b.completed) return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    return a.completed ? 1 : -1;
                });
            }, [activeTasks]);
            
            const done = activeTasks.filter(t => t.completed).length;
            const prog = activeTasks.length > 0 ? Math.round((done / activeTasks.length) * 100) : 0;
            const statusInfo = getLaunchStatus(launch, activeTasks);
            const contourClass = getCardContour(launch);
            const manualLabel = launch.manualLabel || null;
            const labelStyle = manualLabel ? LABEL_COLORS.find(c => c.id === manualLabel.color) : null;

            const toggleTask = async (task) => {
                if (!task.completed) playChime();
                await baseRef.collection('tasks').doc(task.id).update({ completed: !task.completed });
            };

            const addTask = async (e) => {
                e.preventDefault(); if(!txt.trim()) return;
                await baseRef.collection('tasks').add({
                    launchId: launch.id, text: txt.trim(), assignee: selAssignee || null,
                    completed: false, isDeleted: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setTxt(''); setSelAssignee('');
            };

            const playChime = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const note = (f, s, d, v) => {
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.type = 'sine'; o.frequency.setValueAtTime(f, s);
                        g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, s + d);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(s); o.stop(s + d);
                    };
                    const n = ctx.currentTime;
                    note(523.25, n, 0.5, 0.08); note(783.99, n + 0.05, 0.4, 0.06);
                } catch(e) {}
            };

            return (
                <div className={`bg-[#161920] rounded-[2.5rem] flex flex-col h-[650px] relative overflow-hidden transition-all duration-500 group shadow-2xl ${contourClass}`}>
                    <div className="p-6 border-b border-white/5 shrink-0 bg-gradient-to-b from-white/[0.01] to-transparent">
                        <div className="flex justify-between items-start mb-4">
                            <div className="flex-1 truncate pr-4">

                    <div className="flex-1 overflow-y-auto p-5 space-y-3 custom-scrollbar bg-black/5">
                        {allLaunchTasks.length === 0 && (

                                <span className="text-2xl mb-2">📋</span>

                                        <div className="flex items-center gap-3 mt-2">
                                            {t.assignee && <span className="text-[9px] font-bold text-cyan-600 flex items-center gap-1 uppercase tracking-tighter"><Icons.User /> {t.assignee}</span>}
                                            {t.impedimentReason && <span className="text-[8px] font-black text-white uppercase flex items-center gap-1 bg-red-600 px-1.5 py-0.5 rounded shadow-lg shadow-red-900/40"><Icons.Alert /> Impedido</span>}

                    <form className="p-4 bg-black/20 border-t border-white/5" onSubmit={addTask}>

                    </form>

                    {activeTaskDetail && (

                    {isEditModal && <EditLaunchModal launch={launch} onClose={() => setIsEditModal(false)} db={db} />}
                    {isTagModal && <ManualTagModal launch={launch} onClose={() => setIsTagModal(false)} db={db} />}
                    {isDelModal && <DeleteConfirmModal onConfirm={() => baseRef.collection('launches').doc(launch.id).update({isDeleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp()})} onCancel={() => setIsDelModal(false)} />}

        function ManualTagModal({ launch, onClose, db }) {
            const [text, setText] = useState(launch.manualLabel?.text || '');
            const [color, setColor] = useState(launch.manualLabel?.color || 'cyan');
            
            const handleSave = async () => {
                const baseRef = db.collection('shaktar_data').doc('main');
                if (!text.trim()) {
                    await baseRef.collection('launches').doc(launch.id).update({ manualLabel: firebase.firestore.FieldValue.delete() });
                } else {
                    await baseRef.collection('launches').doc(launch.id).update({ manualLabel: { text: text.trim(), color: color } });

                onClose();
            };

            return (

                                {LABEL_COLORS.map(c => (
                                    <button

                                        onClick={() => setColor(c.id)}
                                        className={`w-8 h-8 rounded-full transition-all duration-300 transform ${color === c.id ? 'scale-125 ring-4 ring-white/10 border-2 border-white' : 'hover:scale-110 opacity-50 hover:opacity-100'}`}

                        </div>

                </div>
            );
        }

        function PipelineView({ launches, tasks, assignees }) {
            const today = new Date();
            today.setHours(0,0,0,0);

            const processed = useMemo(() => {
                return launches.map(l => {
                    const lTasks = tasks.filter(t => t.launchId === l.id && !t.isDeleted);
                    const status = getLaunchStatus(l, lTasks);
                    const contour = getCardContour(l);
                    
                    const capDate = parseLocalDate(l.dateStart);
                    const eventStart = parseLocalDate(l.dateEvent);
                    
                    const diffCap = capDate ? Math.ceil((capDate - today) / (1000 * 60 * 60 * 24)) : null;
                    const diffEvent = eventStart ? Math.ceil((eventStart - today) / (1000 * 60 * 60 * 24)) : null;
                    const progVal = lTasks.length > 0 ? Math.round((lTasks.filter(t => t.completed).length / lTasks.length) * 100) : 0;
                    
                    return {
                        ...l,
                        status,
                        contour,
                        progVal,
                        pendingTasks: lTasks.filter(t => !t.completed).length,
                        impediments: lTasks.filter(t => t.impedimentReason && !t.completed).length,
                        diffCap,
                        diffEvent,
                        priority: status.priority
                    };
                }).sort((a, b) => b.priority - a.priority);
            }, [launches, tasks]);

            const squadRadar = useMemo(() => {
                const list = assignees.map(a => {
                    const pending = tasks.filter(t => t.assignee === a.name && !t.completed && !t.isDeleted).length;
                    const isBusyInCritical = launches.some(l => 
                        tasks.some(t => t.launchId === l.id && t.assignee === a.name && !t.completed) && 
                        getLaunchStatus(l, tasks.filter(t => t.launchId === l.id)).level === 'critical'
                    );
                    return { ...a, pending, critical: isBusyInCritical };
                });
                return list.filter(m => m.pending > 0).sort((a,b) => b.pending - a.pending);
            }, [tasks, assignees, launches]);

            const alerts = {
                critical: processed.filter(p => p.status.level === 'critical').length,
                upcoming: processed.filter(p => p.diffCap !== null && p.diffCap >= 0 && p.diffCap <= 12 && p.status.level !== 'critical').length,
                activeImpediments: tasks.filter(t => t.impedimentReason && !t.completed && !t.isDeleted).length,
                criticalLaunchesList: processed.filter(p => p.status.level === 'critical')
            };

            return (
                <div className="flex-1 p-6 max-w-7xl mx-auto w-full flex flex-col gap-8 animate-in overflow-y-auto">
                    
                    <section className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className={`p-6 rounded-[2.5rem] border transition-all relative overflow-hidden ${alerts.critical > 0 ? 'bg-red-500/10 border-red-500/20 ring-4 ring-red-500/5' : 'bg-[#161920] border-white/5'}`}>
                            <div className="flex justify-between items-center mb-4 relative z-10">
                                <div className="flex items-center gap-2">
                                    <Icons.ShieldAlert />
                                    <span className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Críticos / Atrasados</span>
                                </div>
                                <div className={`w-2.5 h-2.5 rounded-full ${alerts.critical > 0 ? 'bg-red-500 animate-pulse shadow-[0_0_10px_#ef4444]' : 'bg-slate-700'}`}></div>
                            </div>
                            <div className="flex items-baseline gap-2 relative z-10">
                                <h3 className="text-4xl font-black text-white">{alerts.critical}</h3>
                                <span className="text-[10px] text-slate-600 font-black uppercase">Operações</span>
                            </div>
                            
                            {/* Identificação de Lançamentos em Risco */}
                            {alerts.criticalLaunchesList.length > 0 && (
                                <div className="mt-4 pt-3 border-t border-red-500/20 space-y-1.5 relative z-10">
                                    {alerts.criticalLaunchesList.map(cl => (
                                        <div key={cl.id} className="flex items-center gap-2">
                                            <div className="w-1 h-1 rounded-full bg-red-500"></div>
                                            <span className="text-[9px] font-bold uppercase text-slate-400 truncate">{cl.title}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                        <div className="p-6 rounded-[2.5rem] bg-[#161920] border border-white/5">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <Icons.Clock />
                                    <span className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Janela de Captação</span>
                                </div>
                            </div>
                            <div className="flex items-baseline gap-2">
                                <h3 className="text-4xl font-black text-cyan-400">{processed.filter(p => p.diffCap !== null && p.diffCap >= 0 && p.diffCap <= 14).length}</h3>
                                <span className="text-[10px] text-slate-600 font-black uppercase">Próximos 14d</span>
                            </div>
                        </div>
                        <div className="p-6 rounded-[2.5rem] bg-[#161920] border border-white/5">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2 text-orange-500">
                                    <Icons.Alert />
                                    <span className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Bloqueios Ativos</span>
                                </div>
                            </div>
                            <div className="flex items-baseline gap-2">
                                <h3 className="text-4xl font-black text-orange-500">{alerts.activeImpediments}</h3>
                                <span className="text-[10px] text-slate-600 font-black uppercase">Impedimentos</span>
                            </div>
                        </div>
                    </section>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <section className="lg:col-span-8 space-y-6">
                            <div className="flex items-center justify-between px-4">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/5 p-2 rounded-lg text-slate-500"><Icons.Chart /></div>
                                    <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em]">Fluxo Operacional de Risco</h2>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {processed.map(l => {
                                    const mLabel = l.manualLabel;
                                    const mStyle = mLabel ? LABEL_COLORS.find(c => c.id === mLabel.color) : null;
                                    return (
                                        <div key={l.id} className={`p-6 rounded-[2rem] bg-[#161920] transition-all flex flex-col md:flex-row gap-6 items-center hover:bg-white/[0.01] ${l.status.class} ${l.contour}`}>
                                            <div className="flex-1 w-full min-w-0">
                                                <div className="flex flex-col gap-2 mb-3">
                                                    <div className="flex items-center gap-3">
                                                        <h4 className={`font-bold text-white text-base truncate uppercase tracking-tight ${l.status.level === 'done' ? 'opacity-40' : ''}`}>{l.title}</h4>
                                                        <div className={`px-2 py-1 rounded-md text-[8px] font-black uppercase tracking-widest text-white shadow-sm ${l.status.color}`}>
                                                            {l.status.label}
                                                        </div>
                                                    </div>
                                                    {mLabel && (
                                                        <div className={`flex items-center gap-1.5 px-2 py-1 rounded border self-start ${mStyle?.bg} ${mStyle?.text} ${mStyle?.border}`}>
                                                            <Icons.Tag />
                                                            <span className="text-[9px] font-black uppercase tracking-widest">{mLabel.text}</span>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex flex-wrap gap-3 items-center">
                                                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-xl border ${l.status.level === 'critical' ? 'bg-red-500/10 border-red-500/30 text-red-400' : 'bg-black/40 border-white/5 text-slate-400'}`}>
                                                        <Icons.Clock />
                                                        <span className="text-[10px] font-bold uppercase">Cap: <span className="text-white">{l.diffCap !== null ? (l.diffCap <= 0 ? 'Iniciada' : `${l.diffCap}d`) : '--'}</span></span>
                                                    </div>
                                                    <div className="flex items-center gap-2 px-3 py-1.5 rounded-xl border bg-black/40 border-white/5 text-slate-400">
                                                        <Icons.Check />
                                                        <span className="text-[10px] font-bold uppercase">Progresso: <span className="text-white">{l.progVal}%</span></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex gap-6 shrink-0 w-full md:w-auto border-t md:border-t-0 md:border-l border-white/5 pt-4 md:pt-0 md:pl-8">
                                                <div className="flex flex-col items-center">
                                                    <span className="text-[8px] font-black text-slate-600 uppercase mb-1 tracking-widest">Pendências</span>
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-lg shadow-inner ${l.pendingTasks > 0 ? 'bg-white/5 text-white' : 'bg-emerald-500/10 text-emerald-500 border border-emerald-500/20'}`}>
                                                        {l.pendingTasks === 0 ? <Icons.Check /> : l.pendingTasks}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        <section className="lg:col-span-4 space-y-6">
                            <div className="flex items-center gap-3 ml-4 mb-4">
                                <div className="bg-white/5 p-2 rounded-lg text-slate-500"><Icons.Users /></div>
                                <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em]">Carga da Squad</h2>
                            </div>
                            <div className="bg-[#161920] border border-white/5 rounded-[2.5rem] p-6 space-y-3 shadow-xl">
                                {squadRadar.map(member => (
                                    <div key={member.id} className="p-4 bg-black/20 rounded-2xl border border-white/5 flex items-center justify-between group hover:border-cyan-500/30 transition-all">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm font-black text-white shadow-lg transition-all ${member.critical ? 'bg-red-600 pulse-red ring-4 ring-red-600/10' : 'bg-cyan-600'}`}>
                                                {member.name[0]}
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-bold text-slate-300 group-hover:text-white transition-colors">{member.name}</span>
                                                {member.critical && <span className="text-[8px] font-black text-red-500 uppercase tracking-widest">Em Risco</span>}
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-end">
                                            <span className="text-[9px] font-black text-slate-600 uppercase mb-1">Tasks</span>
                                            <span className={`text-base font-black ${member.pending > 8 ? 'text-red-500' : member.pending > 4 ? 'text-yellow-500' : 'text-cyan-400'}`}>
                                                {member.pending}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-[#161920]/40 border border-white/5 rounded-[2.5rem] p-8 space-y-6">
                                <h3 className="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em] flex items-center gap-2">
                                    <div className="w-1 h-3 bg-cyan-600"></div> Legenda Operacional
                                </h3>
                                
                                <div className="grid grid-cols-1 gap-4">
                                    <LegendItem color="bg-red-600" label="Crítico (Tasks + 12d captação)" />
                                    <LegendItem color="bg-red-500" label="Urgente (Captação < 3d)" />
                                    <LegendItem color="bg-orange-500" label="Alerta (Captação < 7d)" />
                                    <LegendItem color="bg-purple-600" label="Em Evento" />
                                    <LegendItem color="bg-cyan-700" label="Planejamento" />
                                    <LegendItem color="bg-slate-600" label="Encerrado" />
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        }

        function LegendItem({ color, label }) {
            return (
                <div className="flex items-center gap-3 group">
                    <div className={`w-2.5 h-2.5 rounded-full ${color} shrink-0 shadow-lg`}></div>
                    <span className="text-[10px] font-bold text-slate-400 group-hover:text-slate-200 transition-colors uppercase tracking-tight">{label}</span>
                </div>
            );
        }

        function AddLaunchModal({ onClose, db }) {
            const [data, setData] = useState({ title: '', dateStart: '', dateEvent: '', dateEnd: '' });
            const [error, setError] = useState('');

            const validateAndSave = async (e) => {
                e.preventDefault();
                const d1 = parseLocalDate(data.dateStart);
                const d2 = parseLocalDate(data.dateEvent);
                const d3 = parseLocalDate(data.dateEnd);
                if (!data.title.trim()) return setError('Nome obrigatório.');
                if (!d1 || !d2 || !d3) return setError('Datas obrigatórias.');
                if (d1 > d2) return setError('Captação após Início Evento.');
                if (d2 > d3) return setError('Início após Término.');
                await db.collection('shaktar_data').doc('main').collection('launches').add({
                    ...data, isDeleted: false, isArchived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4 animate-in backdrop-blur-sm">
                    <div className="bg-[#1c2128] p-10 rounded-[2.5rem] w-full max-w-md border border-white/10 shadow-2xl relative">
                        <button onClick={onClose} className="absolute top-8 right-8 text-slate-500 hover:text-white transition-colors"><Icons.X /></button>
                        <h2 className="text-xl font-bold mb-8 text-white tracking-tight flex items-center gap-3">🚀 Novo Lançamento</h2>
                        <form className="space-y-5" onSubmit={validateAndSave}>
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 pl-2">Nome do Projeto</label>
                                <input autoFocus className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white outline-none focus:ring-2 focus:ring-cyan-500/40" value={data.title} onChange={e => setData({...data, title: e.target.value})} placeholder="Ex: Jornada XRM" />
                            </div>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-500 uppercase block mb-1 pl-2">Início Captação</label>
                                    <input type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white text-xs outline-none focus:border-cyan-500/30" value={data.dateStart} onChange={e => setData({...data, dateStart: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-1 pl-2">Início Evento</label>
                                        <input type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white text-xs outline-none focus:border-cyan-500/30" value={data.dateEvent} onChange={e => setData({...data, dateEvent: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-1 pl-2">Fim Evento</label>
                                        <input type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white text-xs outline-none focus:border-cyan-500/30" value={data.dateEnd} onChange={e => setData({...data, dateEnd: e.target.value})} />
                                    </div>
                                </div>
                            </div>
                            {error && <p className="text-red-500 text-[10px] font-black uppercase tracking-widest text-center animate-pulse">{error}</p>}
                            <button className="w-full bg-cyan-600 hover:bg-cyan-500 py-5 rounded-2xl font-black text-white text-[11px] uppercase tracking-[0.2em] transition-all active:scale-95 shadow-lg shadow-cyan-900/20">Criar Operação</button>
                        </form>
                    </div>
                </div>
            );
        }

        function TaskDetailModal({ task, assignees, onClose, onUpdate }) {
            const [text, setText] = useState(task.text);
            const [assignee, setAssignee] = useState(task.assignee || '');
            const [impediment, setImpediment] = useState(task.impedimentReason || '');
            const [impType, setImpType] = useState(task.impedimentType || '');

            return (
                <div className="absolute inset-0 bg-[#0f1115]/98 backdrop-blur-md z-[100] p-6 flex flex-col animate-in">
                    <div className="flex justify-between items-center mb-6">
                        <h4 className="font-bold text-cyan-400 uppercase text-[10px] tracking-[0.2em]">Detalhes da Tarefa</h4>
                        <button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button>
                    </div>
                    <div className="flex-1 space-y-6 overflow-y-auto custom-scrollbar pr-2">
                        <div>
                            <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest pl-2 block mb-2">Descrição da Tarefa</label>
                            <textarea className="w-full bg-white/[0.03] border border-white/10 p-4 rounded-2xl text-[13px] text-white outline-none focus:border-cyan-500/40 min-h-[80px] resize-none" value={text} onChange={e => setText(e.target.value)} />
                        </div>
                        <div>
                            <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest pl-2 block mb-2">Especialista Responsável</label>
                            <ModernSelect value={assignee} options={assignees} onChange={setAssignee} />
                        </div>
                        <div className="bg-red-500/5 border border-red-500/20 p-5 rounded-[2rem] space-y-4">
                            <div className="flex items-center gap-2 mb-1">
                                <Icons.Alert />
                                <span className="text-[10px] font-black text-red-500 uppercase tracking-widest">Sinalizar Bloqueio (Blocker)</span>
                            </div>
                            <ModernSelect value={impType} options={IMPEDIMENT_TYPES.map(t => ({id: t, name: t}))} onChange={setImpType} placeholder="Tipo do Impedimento" />
                            <textarea className="w-full bg-black/40 border border-white/5 p-3 rounded-xl text-[12px] text-white outline-none focus:border-red-500/30 placeholder:text-slate-700 min-h-[60px]" placeholder="Descreva o motivo do bloqueio..." value={impediment} onChange={e => setImpediment(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={() => onUpdate({ text, assignee, impedimentReason: impediment, impedimentType: impType })} className="w-full bg-cyan-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-lg active:scale-95 transition-all mt-6 text-white">Salvar Alterações</button>
                </div>
            );
        }

        function EditLaunchModal({ launch, onClose, db }) {
            const [data, setData] = useState({ ...launch });
            return (
                <div className="absolute inset-0 bg-[#161920]/98 backdrop-blur-md z-30 p-8 animate-in rounded-[2.5rem]">
                    <div className="flex justify-between items-center mb-8">
                        <h3 className="font-bold text-white uppercase text-xs tracking-[0.2em]">Configurar Operação</h3>
                        <button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button>
                    </div>
                    <div className="space-y-5">
                        <input className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-white font-bold" value={data.title} onChange={e => setData({...data, title: e.target.value})} />
                        <div className="space-y-4">
                            <div className="grid grid-cols-1 gap-2">
                                <label className="text-[9px] font-black text-slate-600 uppercase pl-2">Captação</label>
                                <input type="date" className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white text-xs" value={data.dateStart || ''} onChange={e => setData({...data, dateStart: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-600 uppercase pl-2">Início</label>
                                    <input type="date" className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white text-xs" value={data.dateEvent || ''} onChange={e => setData({...data, dateEvent: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-600 uppercase pl-2">Fim</label>
                                    <input type="date" className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white text-xs" value={data.dateEnd || ''} onChange={e => setData({...data, dateEnd: e.target.value})} />
                                </div>
                            </div>
                        </div>
                        <button onClick={async () => { await db.collection('shaktar_data').doc('main').collection('launches').doc(launch.id).update(data); onClose(); }} className="w-full bg-cyan-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-lg text-white mt-4 transition-all">Atualizar Dados</button>
                    </div>
                </div>
            );
        }

        function AssigneesModal({ assignees, onClose, db }) {
            const [name, setName] = useState('');
            const baseRef = db.collection('shaktar_data').doc('main');
            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in">
                    <div className="bg-[#1c2128] w-full max-md rounded-[2.5rem] border border-white/10 flex flex-col shadow-2xl overflow-hidden">
                        <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                            <h2 className="font-bold text-white uppercase text-sm tracking-widest flex items-center gap-2"><Icons.Users /> Squad Operacional</h2>
                            <button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button>
                        </div>
                        <form className="p-8 border-b border-white/5 bg-black/20" onSubmit={async (e) => { e.preventDefault(); if(!name.trim()) return; await baseRef.collection('assignees').add({ name: name.trim() }); setName(''); }}>
                            <div className="flex gap-2">
                                <input className="flex-1 bg-[#0f1115] border border-white/10 p-4 rounded-2xl text-sm outline-none focus:border-cyan-500/50 text-white" placeholder="Nome do Especialista..." value={name} onChange={e => setName(e.target.value)} />
                                <button type="submit" className="bg-cyan-600 px-6 rounded-2xl font-bold text-white shadow-lg shadow-cyan-900/10 transition-transform active:scale-95"><Icons.Plus /></button>
                            </div>
                        </form>
                        <div className="p-8 space-y-3 max-h-[40vh] overflow-y-auto custom-scrollbar">
                            {assignees.map(a => (
                                <div key={a.id} className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 group hover:border-white/10 transition-all">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-[10px] font-bold text-slate-400 group-hover:bg-cyan-600 group-hover:text-white transition-all">{a.name[0]}</div>
                                        <span className="text-sm font-bold text-slate-300 group-hover:text-white">{a.name}</span>
                                    </div>
                                    <button onClick={() => baseRef.collection('assignees').doc(a.id).delete()} className="text-slate-700 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icons.Trash /></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ArchivesModal({ launches, tasks, onClose, db }) {
            const baseRef = db.collection('shaktar_data').doc('main');
            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in">
                    <div className="bg-[#1c2128] w-full max-w-3xl rounded-[2.5rem] border border-white/10 flex flex-col h-[80vh] overflow-hidden shadow-2xl">
                        <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                            <h2 className="font-bold text-white uppercase text-sm tracking-widest flex items-center gap-2"><Icons.Archive /> Histórico de Lançamentos</h2>
                            <button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-4 bg-black/10 custom-scrollbar">
                            {launches.map(l => (
                                <div key={l.id} className="p-6 bg-[#161920] rounded-[2rem] border border-white/5 flex justify-between items-center hover:border-white/10 transition-all">
                                    <div className="flex flex-col flex-1 truncate mr-4">
                                        <h4 className="text-white font-bold text-lg truncate">{l.title}</h4>
                                        <span className="text-[10px] text-slate-600 font-bold uppercase mt-1 tracking-widest">{l.dateStart || 'Sem data'}</span>
                                    </div>
                                    <button onClick={() => baseRef.collection('launches').doc(l.id).update({isArchived: false})} className="bg-cyan-600/10 text-cyan-400 border border-cyan-500/20 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all hover:bg-cyan-600 hover:text-white shadow-lg">Restaurar Operação</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function BinModal({ launches, tasks, onClose, db }) {
            const [tab, setTab] = useState('L');
            const baseRef = db.collection('shaktar_data').doc('main');
            const items = tab === 'L' ? launches : tasks;
            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in">
                    <div className="bg-[#1c2128] w-full max-w-2xl rounded-[2.5rem] border border-white/10 flex flex-col h-[80vh] overflow-hidden shadow-2xl">
                        <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                            <h2 className="font-bold text-white uppercase text-sm tracking-widest flex items-center gap-2">Lixeira Operacional</h2>
                            <button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button>
                        </div>
                        <div className="flex p-2 gap-2 bg-black/30 border-b border-white/5">
                            <button onClick={() => setTab('L')} className={`flex-1 py-4 rounded-xl text-[10px] font-black uppercase transition-all ${tab === 'L' ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 shadow-inner' : 'text-slate-600'}`}>Lançamentos ({launches.length})</button>
                            <button onClick={() => setTab('T')} className={`flex-1 py-4 rounded-xl text-[10px] font-black uppercase transition-all ${tab === 'T' ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 shadow-inner' : 'text-slate-600'}`}>Tarefas ({tasks.length})</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-4 bg-black/10 custom-scrollbar">
                            {items.map(i => (
                                <div key={i.id} className="p-5 bg-[#0f1115] rounded-3xl flex justify-between items-center border border-white/5 group hover:border-white/10 transition-all">
                                    <div className="flex flex-col flex-1 truncate mr-4">
                                        <span className="text-sm truncate font-medium text-slate-300 group-hover:text-white">{i.title || i.text}</span>
                                    </div>
                                    <div className="flex gap-2 shrink-0">
                                        <button onClick={() => baseRef.collection(tab === 'L' ? 'launches' : 'tasks').doc(i.id).update({isDeleted: false, deletedAt: null})} className="text-cyan-400 text-[9px] font-black border border-cyan-500/30 px-4 py-2 rounded-xl hover:bg-cyan-500 hover:text-white transition-all flex items-center gap-2 uppercase tracking-widest"><Icons.RotateCcw /> Restaurar</button>
                                        <button onClick={() => baseRef.collection(tab === 'L' ? 'launches' : 'tasks').doc(i.id).delete()} className="text-red-500 text-[9px] font-black border border-red-500/30 px-4 py-2 rounded-xl hover:bg-red-600 hover:text-white transition-all flex items-center gap-2 uppercase tracking-widest">Apagar</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function DeleteConfirmModal({ onConfirm, onCancel }) {
            return (
                <div className="absolute inset-0 bg-black/95 z-40 flex flex-col items-center justify-center p-10 text-center rounded-[2.5rem]">
                    <div className="w-16 h-16 bg-red-600/10 text-red-600 rounded-3xl flex items-center justify-center mb-6"><Icons.Trash /></div>
                    <p className="font-bold text-white text-lg uppercase mb-2">Remover Projeto?</p>
                    <div className="flex gap-4 w-full mt-6">
                        <button onClick={onCancel} className="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase text-slate-400">Abortar</button>
                        <button onClick={onConfirm} className="flex-1 bg-red-600 py-4 rounded-2xl text-[10px] font-black uppercase text-white shadow-lg shadow-red-900/20 active:scale-95 transition-all">Confirmar</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
